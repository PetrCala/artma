version: "3.8"
services:
  postgres:
    container_name: postgres
    build:
      context: ./Database
      dockerfile: Dockerfile
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - "5432:5432"
    volumes:
      - ./Database:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data # Make data persistent across container restarts
    restart: always

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    restart: always

  flask_dev:
    container_name: flask_dev
    image: ${FLASK_IMAGE_NAME}
    build:
      context: ./Flask
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./Flask:/usr/src/app
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - FLASK_RUN_HOST=${FLASK_RUN_HOST}
      - FLASK_RUN_PORT=${FLASK_RUN_PORT}
      - R_API_URL=http://r:${R_PORT}

  flask_prod:
    container_name: flask_prod
    image: ${FLASK_IMAGE_NAME}
    build:
      context: ./Flask
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./Flask:/usr/src/app
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - FLASK_RUN_HOST=${FLASK_RUN_HOST}
      - FLASK_RUN_PORT=${FLASK_RUN_PORT}
      - R_API_URL=http://r:${R_PORT}

  react_dev:
    container_name: react_dev
    image: ${REACT_IMAGE_NAME}
    build:
      context: ./React
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./React/client:/client
    environment:
      - FLASK_API_URL=http://flask:${FLASK_RUN_PORT} # URL to the Flask API
      - R_API_URL=http://r:${R_PORT}

  react_prod:
    container_name: react_prod
    image: ${REACT_IMAGE_NAME}
    build:
      context: ./React
      dockerfile: Dockerfile
      target: prod
    ports:
      - "3000:3000"
    volumes:
      - ./React/client:/client
    environment:
      - FLASK_API_URL=http://flask:${FLASK_RUN_PORT} # URL to the Flask API
      - R_API_URL=http://r:${R_PORT}

  r_dev:
    container_name: r_dev
    image: ${R_IMAGE_NAME}
    build:
      context: ./R
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    volumes:
      - ./R/r_scripts:/r_scripts
    environment:
      - R_HOST=${R_HOST}
      - R_PORT=${R_PORT}

  r_prod:
    container_name: r_prod
    image: ${R_IMAGE_NAME}
    build:
      context: ./R
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    volumes:
      - ./R/r_scripts:/r_scripts
    environment:
      - R_HOST=${R_HOST}
      - R_PORT=${R_PORT}

volumes:
  pgdata:
