# Full R CMD check across the complete matrix, including R-devel and
# oldrel, with vignettes. Runs after merges to master instead of on
# PRs: R-devel has no binary packages and its version string embeds a
# unique build id, so its dependency cache can never be restored and
# every run compiles the whole dependency tree from source (5+ min).
# Running the release configs here also saves their dependency caches
# on master, where every PR branch can restore them. The weekly run
# keeps those caches from being evicted during quiet periods and
# catches breakage against a moving R-devel.
name: R CMD Check (extended)

on:
  push:
    branches: master
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions: read-all

# Grouped by workflow name only, not ref: push, schedule, and dispatch
# runs of this workflow all target master anyway, and only the newest
# run (repo tip) needs to validate and refresh the dependency caches,
# so a merge burst collapses to one run instead of queuing several.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest, r: "release" }
          - { os: windows-latest, r: "release" }
          - { os: ubuntu-latest, r: "devel", http-user-agent: "release" }
          - { os: ubuntu-latest, r: "release" }
          - { os: ubuntu-latest, r: "oldrel-1" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # RoBMA (Suggests) needs the JAGS system library. On Linux
      # setup-r-dependencies installs it from the declared sysreqs; macOS and
      # Windows need it installed explicitly.
      - name: Install JAGS (macOS)
        if: runner.os == 'macOS'
        run: brew install jags

      - name: Install JAGS (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          installer="$RUNNER_TEMP/jags-installer.exe"
          curl -L -o "$installer" \
            https://sourceforge.net/projects/mcmc-jags/files/JAGS/4.x/Windows/JAGS-4.3.1.exe/download
          "$installer" //S
          echo "JAGS_HOME=C:/Program Files/JAGS/JAGS-4.3.1" >> "$GITHUB_ENV"
          echo "C:/Program Files/JAGS/JAGS-4.3.1/x64/bin" >> "$GITHUB_PATH"

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  # Runs once per run regardless of how many matrix legs failed, since
  # nobody watches master CI and a failure here (e.g. against a moving
  # R-devel) would otherwise go unnoticed until the next PR.
  notify-on-failure:
    needs: R-CMD-check
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: File or update a CI failure issue
        run: |
          set -euo pipefail
          MARKER="ci: extended check failing"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }}"
          FAILED_CONFIGS=$(gh run view "${{ github.run_id }}" --repo "$REPO" --json jobs \
            --jq '[.jobs[] | select(.conclusion=="failure") | .name] | join(", ")')

          {
            echo "Extended R CMD check failed."
            echo ""
            echo "Run: $RUN_URL"
            echo "Failing configs: ${FAILED_CONFIGS:-unknown}"
          } > /tmp/issue-body.md

          EXISTING=$(gh issue list --repo "$REPO" --state open --search "\"$MARKER\" in:title" \
            --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" --body-file /tmp/issue-body.md
          else
            gh issue create --repo "$REPO" --title "$MARKER" --body-file /tmp/issue-body.md
          fi
